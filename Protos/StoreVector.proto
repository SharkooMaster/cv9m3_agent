syntax = "proto3";

import "google/protobuf/empty.proto";

service StoreVector
{
    rpc Store (StoreVector_Req) returns (StoreVector_Res);
}

message StoreVector_Req
{
    string bitstring = 1;
    repeated float vector = 2;
    string metadata = 3;
    string targetIp = 4;
}

message StoreVector_Res
{
    uint64 id = 1;
}
