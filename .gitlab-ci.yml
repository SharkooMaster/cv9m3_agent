---
stages:
  - test
  - build
  - deploy

# Test Stage
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:6.0
  script:
    - dotnet restore
    - dotnet build
    - dotnet test
  only:
    - main

# Build Stage
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t registry.gitlab.com/your-project/$CI_PROJECT_NAME:latest .
    - docker push registry.gitlab.com/your-project/$CI_PROJECT_NAME:latest
  only:
    - main
