---
stages:
  - test
  - build
  - push

# Test Stage
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet restore Agent.Tests/Agent.Tests.csproj
    - dotnet build Agent.Tests/Agent.Tests.csproj
    - dotnet test Agent.Tests/Agent.Tests.csproj
  only:
    - dev

# Build Stage
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t registry.gitlab.com/tpvdb/tpvdb/agent .
  only:
    - dev

push_image:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker push registry.gitlab.com/tpvdb/tpvdb/agent
  only:
    - dev

