stages:
  - build
  - test
  - deploy

build:
  stage: build
  script:
    - dotnet restore
    - dotnet build
    - docker build -t local/$CI_PROJECT_NAME:$CI_COMMIT_SHA .
    - docker tag local/$CI_PROJECT_NAME:$CI_COMMIT_SHA local/$CI_PROJECT_NAME:latest
    - minikube image load local/$CI_PROJECT_NAME:latest
  only:
    - main

unit-test:
  stage: test
  script:
    - dotnet test --filter Category=Unit
  only:
    - main

deploy:
  stage: deploy
  script:
    - echo "Triggering shared deployment pipeline for Agent"
    - |
      curl -X POST \
        -H "Content-Type: application/json" \
        -H "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        -d '{
          "ref": "main",
          "variables": {
            "TRIGGER_JOB": "build-agent",
            "AGENT_IMAGE_TAG": "'$CI_COMMIT_SHA'"
          }
        }' \
        https://gitlab.com/api/v4/projects/$SHARED_DEPLOYMENT_PROJECT_ID/trigger/pipeline
  only:
    - main
