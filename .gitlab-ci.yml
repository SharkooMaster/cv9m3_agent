---
stages:
  - test
  - build
  - push
  - deploy

# Test Stage
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet restore Agent.Tests/Agent.Tests.csproj
    - dotnet build Agent.Tests/Agent.Tests.csproj
    - dotnet test Agent.Tests/Agent.Tests.csproj
  only:
    - dev

# Build Stage
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t registry.gitlab.com/tpvdb/tpvdb/agent .
    - docker push registry.gitlab.com/tpvdb/tpvdb/agent
  only:
    - dev

deploy:
  stage: deploy
  script:
    - echo "User $(whoami)"
    - kubectl get pods
    - kubectl set image deployment/agent-deployment agent=registry.gitlab.com/tpvdb/tpvdb/agent --record
  only:
    - dev
